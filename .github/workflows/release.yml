name: release

# Continuous release driven by semantic-release (Conventional Commits).
#
# On every push to main:
#   1. semantic-release analyzes commits, and if a release is warranted, creates
#      the GitHub Release + git tag vX.Y.Z and the release notes.
#   2. If (and only if) a release was published, build + push the server Docker
#      image to GHCR (ghcr.io/<owner>/cortexmd:X.Y.Z + :latest), and build the
#      Rust `cortexmd` binaries and attach them to the release.
#
# Deploy side: a host that runs `image: ghcr.io/<owner>/cortexmd:latest` (e.g. a
# Komodo stack with auto-update) pulls the new image automatically — no build on
# the deploy host, no source checkout. See docs/deploy-http.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create releases + tags
      issues: write          # semantic-release release/PR comments
      pull-requests: write
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history so commit analysis works
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          # Config lives in .releaserc.json (commit-analyzer + notes + github;
          # NO npm publish).
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build + push GHCR image
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # push to GHCR
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cortexmd" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ needs.release.outputs.version }}
            ${{ steps.img.outputs.name }}:latest
          build-args: |
            APP_VERSION=${{ needs.release.outputs.version }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  binaries:
    name: cortexmd binary (${{ matrix.target }})
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25      # fail fast instead of hanging on a stuck runner
    permissions:
      contents: write        # upload assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          # Cross-compile the Intel target on the arm64 runner — GitHub's
          # macos-13 (Intel) runners are queue-starved and hang for hours.
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/cli
      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin cortexmd
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/cortexmd${{ matrix.ext }}"
          stage="cortexmd-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "$bin" "$stage/"
          cp README.md LICENSE "$stage/" 2>/dev/null || true
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$stage.zip" "$stage" >/dev/null
            echo "ASSET=$stage.zip" >> "$GITHUB_ENV"
          else
            tar -czf "$stage.tar.gz" "$stage"
            echo "ASSET=$stage.tar.gz" >> "$GITHUB_ENV"
          fi
      - name: Attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ needs.release.outputs.version }}" "$ASSET" --clobber
