name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: TS server (build + typecheck)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/server/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  cli:
    name: Rust CLI (build + test)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build + test the whole workspace (root Cargo.toml; crates/cli produces
      # the `cortexmd` binary from the `cortexmd-cli` crate). edition = "2021"
      # is pinned in crates/cli/Cargo.toml.
      - run: cargo build --release --locked --workspace
      - run: cargo test --locked --workspace

  # NOTE: symbol-ID golden-fixture parity now lives in its own workflow,
  # .github/workflows/contract.yml (the wired-up replacement for the former
  # placeholder job here).

  coupling-gate:
    name: No private coupling in tracked files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for forbidden strings
        # This workflow file itself defines the forbidden patterns, so it is
        # excluded. Everything else in the tree must stay clean.
        run: |
          if git grep -nIE 'weill-duflos|resilio|Robotoine|192\.168\.|/srv/|claude-sonnet-4-' -- . \
            ':(exclude).github/workflows/ci.yml'; then
            echo "::error::Found private/operator-specific coupling in tracked files (see matches above)."
            exit 1
          fi
          echo "clean: no forbidden coupling strings found"
