name: release

# Build the `cortexmd` Rust binary for Linux / macOS / Windows on a version-tag
# push, attach the archives to a GitHub Release, and (optionally) publish the
# TS server to npm. CI (build/test) and contract parity live in their own
# workflows; this one only runs on tags.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_server:
        description: "Also publish @cortexmd/server to npm"
        type: boolean
        default: false

permissions:
  contents: write   # create releases + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-cli:
    name: cortexmd (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    defaults:
      run:
        working-directory: crates/cli
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/cli

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/cortexmd${{ matrix.ext }}"
          stage="cortexmd-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "$bin" "$stage/"
          cp ../../README.md ../../LICENSE "$stage/" 2>/dev/null || true
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$stage.zip" "$stage" >/dev/null
            echo "ASSET=crates/cli/$stage.zip" >> "$GITHUB_ENV"
          else
            tar -czf "$stage.tar.gz" "$stage"
            echo "ASSET=crates/cli/$stage.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cortexmd-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update release and attach binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-server:
    name: Publish @cortexmd/server to npm
    needs: build-cli
    runs-on: ubuntu-latest
    # Opt-in: tag push only publishes when NPM_TOKEN is configured, or via the
    # workflow_dispatch checkbox. Never blocks the binary release.
    if: |
      (startsWith(github.ref, 'refs/tags/v') && vars.PUBLISH_SERVER == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_server)
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
